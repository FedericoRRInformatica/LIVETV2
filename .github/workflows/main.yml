permissions:
  contents: write

name: RUN SCRIPT LISTA

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/lista.py'
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright bs4 rapidfuzz fuzzywuzzy python-Levenshtein python-dateutil python-dotenv pillow cloudscraper
          playwright install
          playwright install-deps

      - name: Run Script
        run: python scripts/lista.py
        env:
          LINK_DADDYBYPASS: ${{ secrets.LINK_DADDYBYPASS }}

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git status
          git diff --stat

          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "Update liste - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "Nessuna modifica da committare"
          fi
